name: CI

# Corre en cada push y en cada PR -- red de contencion automatica: si algo
# rompe el build o un test, se ve en GitHub sin que nadie tenga que
# acordarse de correrlo a mano.
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Valores dummy -- ningun test/build toca un Supabase real (los servicios
    # se prueban con fakes inyectados), pero supabaseClient.js llama a
    # createClient() apenas se importa el modulo y tira si faltan. Localmente
    # esto lo tapa el .env de cada dev; en CI no existe, asi que hace falta
    # declararlo aca (no son credenciales, no van a ningun Supabase real).
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Tests unitarios
        run: npm test

      - name: Build
        run: npm run build

      - name: Instalar navegador para e2e
        run: npx playwright install --with-deps chromium

      - name: Tests e2e (Playwright)
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
